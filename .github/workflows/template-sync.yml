name: Template sync

# Opt-in workflow that periodically opens a PR with upstream *scaffold* changes
# (CI, tooling, docs, scripts) from ludeeus/integration_blueprint. It never
# touches your integration code (custom_components/**) or your per-repo identity
# files -- those are excluded by .templatesyncignore.
#
# Full documentation: .github/template-sync.md
# (Quick-start setup follows; the doc has the safety guard, EOL handling, and
#  troubleshooting in depth.)
#
# Setup — create a PAT and save it as the repo secret TEMPLATE_SYNC_PAT:
#
#   Fine-grained PAT (recommended; scope it to this repo only):
#     - Contents:      Read and write   (push the sync branch)
#     - Pull requests: Read and write   (open the sync PR)
#     - Workflows:     Read and write   (payload includes .github/workflows/*)
#
#   Classic PAT (simpler, broader):
#     - repo       (contents + pull requests)
#     - workflow   (a SEPARATE scope — required to push .github/workflows/*)
#
# This one PAT authenticates BOTH the checkout below and the push/PR, so it
# needs write access, not just read. The default GITHUB_TOKEN cannot be used:
# it is not allowed to write workflow files, so the push would 403 on them.
# Symptom of a too-narrow token: checkout + sync succeed, then the push fails
# with "remote: Permission ... denied ... 403" (missing Contents or Workflows
# write), or the PR step fails (missing Pull requests write).

on:
  workflow_dispatch:
  schedule:
    # 1st of every month at 06:00 UTC
    - cron: "0 6 1 * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  template-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Use the PAT so the sync can update .github/workflows/* files.
          token: ${{ secrets.TEMPLATE_SYNC_PAT }}
          # Required by actions-template-sync when a non-default token is used.
          persist-credentials: false

      - name: Sync from blueprint
        uses: AndreasAugustin/actions-template-sync@8a0f668b83c32a0f673353086d74f12b8853d4f5 # v2.5.3
        with:
          source_repo_path: ludeeus/integration_blueprint
          upstream_branch: main
          target_gh_token: ${{ secrets.TEMPLATE_SYNC_PAT }}
          pr_labels: sync_template
          # Hooks are enabled for two narrow, well-scoped steps only:
          #   precommit: `git add --renormalize .` enforces THIS repo's own
          #     .gitattributes policy (`* text=auto eol=lf`) on the merged files.
          #     Upstream stores LICENSE/README/CONTRIBUTING with CRLF, so without
          #     this every sync PR shows a whole-file line-ending diff. This is
          #     not a custom transform -- it just makes the result obey the rule
          #     the repo already declares.
          #   prepush: the fail-closed guard. It only validates; never edits.
          is_allow_hooks: true
          hooks: |
            precommit:
              commands:
                - git add --renormalize .
            prepush:
              commands:
                - .github/template-sync-guard.sh
